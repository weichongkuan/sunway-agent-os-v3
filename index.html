<!-- Generated by Trae Work -->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Sunway Agent OS V3｜数字分身工作台</title>
<style>
/* ===== 设计变量 ===== */
:root{
  --navy:#071522;--navy2:#102b43;--navy3:#173c5c;
  --gold:#c29a55;--gold2:#e2c37f;--gold3:#b88a45;
  --ink:#192231;--sub:#697586;--muted:#96a0ad;
  --line:#e8eaed;--bg:#f7f8fa;--white:#fff;
  --green:#197a56;--greenbg:#eaf6ef;
  --amber:#8d641e;--amberbg:#fff5dc;
  --blue:#315fa7;--bluebg:#edf3ff;
  --red:#a83d45;--redbg:#fff0f1;
  --radius:16px;--gap:24px;
  font-family:"Noto Sans SC","Microsoft YaHei","PingFang SC",system-ui,sans-serif;
}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--ink);-webkit-font-smoothing:antialiased}
button,textarea,input{font:inherit}button{cursor:pointer}
.app{height:100vh;min-height:720px;min-width:1120px;display:grid;grid-template-columns:220px 1fr;overflow:hidden}

/* ===== 侧边栏 ===== */
aside{background:linear-gradient(180deg,var(--navy),#0d2438);color:#fff;padding:20px 16px;display:flex;flex-direction:column;min-height:0}
.logo{height:44px;background:#fff;border-radius:10px;padding:8px 12px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:14px;color:var(--navy);letter-spacing:.4px}
.workspace{padding:18px 8px 20px}
.workspace small{font-size:10px;color:#8598ad}
.workspace b{font-size:13px;display:block;margin-top:5px}
.nav{flex:1;overflow-y:auto}
.nav button{border:0;background:transparent;color:#acbbca;width:100%;min-height:48px;border-radius:11px;padding:0 11px;margin:3px 0;display:flex;align-items:center;gap:11px;text-align:left;font-size:13px;transition:.18s}
.nav button:hover{background:rgba(255,255,255,.05);color:#fff}
.nav button.active{background:rgba(226,195,127,.14);color:#fff}
.nav button.gold-nav{color:var(--gold2)}
.nav button.gold-nav.active{background:linear-gradient(135deg,rgba(226,195,127,.18),rgba(194,154,85,.1));border:1px solid rgba(226,195,127,.25)}
.ico{width:26px;height:26px;border:1px solid rgba(255,255,255,.14);border-radius:8px;display:grid;place-items:center;font-size:10px;font-weight:800;flex:none}
.nav button.gold-nav .ico{border-color:rgba(226,195,127,.35);color:var(--gold2)}
.role-wrap{margin-top:auto;position:relative}
.role-card{border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.055);border-radius:13px;padding:11px;display:grid;grid-template-columns:38px 1fr auto;gap:10px;align-items:center;cursor:pointer;transition:.15s}
.role-card:hover{background:rgba(255,255,255,.08)}
.avatar{width:38px;height:38px;border-radius:10px;background:linear-gradient(135deg,var(--gold),#765126);display:grid;place-items:center;font-weight:800;font-size:13px}
.role-card b{font-size:12px}
.role-card span{display:block;color:#8597aa;font-size:10px;margin-top:3px}
.role-menu{display:none;position:absolute;left:0;right:0;bottom:64px;background:#fff;color:var(--ink);padding:7px;border-radius:12px;box-shadow:0 24px 65px rgba(0,0,0,.22);z-index:30}
.role-menu.show{display:block}
.role-option{width:100%;border:0;background:transparent;border-radius:9px;padding:9px;text-align:left;cursor:pointer}
.role-option:hover{background:#f1f3f5}
.role-option b{font-size:11px}.role-option span{font-size:9.5px;color:var(--sub)}

/* ===== 主内容区 ===== */
main{min-width:0;display:flex;flex-direction:column;min-height:0;height:100%;overflow:hidden}
.topbar{height:64px;background:#fff;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;padding:0 24px;flex:none}
.crumb{font-size:12px;color:var(--sub)}
.crumb b{font-size:14px;color:var(--ink);margin-left:7px}
.top-actions{display:flex;align-items:center;gap:10px}
.mode{font-size:10px;color:var(--green);background:var(--greenbg);border-radius:20px;padding:7px 11px}
.search{width:240px;height:36px;border:1px solid var(--line);background:#f8f9fa;border-radius:10px;padding:0 12px;display:flex;align-items:center;color:var(--muted);font-size:11px}

/* ===== 通用按钮 ===== */
.btn{height:38px;border:1px solid var(--line);background:#fff;color:var(--ink);border-radius:10px;padding:0 14px;font-size:12px;font-weight:700;transition:.15s}
.btn:hover{border-color:var(--gold2)}
.btn.primary{background:var(--navy);border-color:var(--navy);color:#fff}
.btn.primary:hover{background:var(--navy3)}
.btn.gold{background:linear-gradient(135deg,var(--gold3),var(--gold2));border-color:var(--gold3);color:#25190a}
.btn:disabled{opacity:.55;cursor:not-allowed}
.mini-btn{height:30px;border:1px solid var(--line);background:#fff;border-radius:8px;padding:0 10px;font-size:10.5px;font-weight:700;cursor:pointer;transition:.15s}
.mini-btn:hover{border-color:var(--gold2)}

/* ===== 内容区 ===== */
.content{flex:1;overflow:auto;padding:24px 24px 32px}
.view{max-width:1200px;margin:0 auto}
.page-head{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:20px}
.page-head h1{font-size:24px;margin:0}
.page-head p{font-size:13px;color:var(--sub);margin:7px 0 0}
.section-gap{margin-top:var(--gap)}

/* ===== 卡片 ===== */
.card{background:#fff;border:1px solid var(--line);border-radius:var(--radius);box-shadow:0 4px 16px rgba(7,21,34,.04);padding:20px}
.card-title{font-size:15px;font-weight:800}
.card-sub{font-size:12px;color:var(--sub);line-height:1.55;margin-top:5px}

/* ===== 标签 ===== */
.badge{display:inline-flex;align-items:center;gap:4px;border-radius:20px;padding:5px 9px;font-size:10px;background:var(--greenbg);color:var(--green);font-weight:700}
.badge.amber{background:var(--amberbg);color:var(--amber)}
.badge.blue{background:var(--bluebg);color:var(--blue)}
.badge.red{background:var(--redbg);color:var(--red)}
.badge.gray{background:#eef0f3;color:var(--muted)}

/* ===== 折叠/展开（渐进式展开核心）===== */
.collapse-head{display:flex;align-items:center;justify-content:space-between;cursor:pointer;user-select:none;transition:.15s}
.collapse-head:hover{opacity:.85}
.collapse-head .arrow{width:24px;height:24px;display:grid;place-items:center;color:var(--muted);transition:transform .35s;font-size:13px;flex:none}
.collapse-head.open .arrow{transform:rotate(90deg)}
.collapse-body{max-height:0;overflow:hidden;transition:max-height .45s cubic-bezier(.4,0,.2,1)}
.collapse-body.open{max-height:6000px}

/* ===== Hero区 ===== */
.hero{background:linear-gradient(135deg,var(--navy),var(--navy3));border-radius:var(--radius);color:#fff;padding:28px;display:grid;gap:24px;align-items:center;box-shadow:0 12px 34px rgba(7,21,34,.12)}
.hero-left h1{font-size:26px;margin:0}
.hero-left p{font-size:12px;color:#aebfce;line-height:1.7;margin:9px 0 0}
.hero-metrics{display:flex;gap:14px;flex-wrap:wrap}
.h-metric{min-width:100px;border:1px solid rgba(255,255,255,.13);background:rgba(255,255,255,.06);border-radius:11px;padding:13px;text-align:center}
.h-metric b{font-size:20px;color:var(--gold2);display:block}
.h-metric span{display:block;font-size:10px;color:#9fb0c4;margin-top:4px}
.hero-avatar{width:64px;height:64px;border-radius:50%;background:linear-gradient(135deg,var(--gold2),var(--gold3));display:grid;place-items:center;font-weight:800;font-size:26px;color:#25190a;flex:none;border:3px solid rgba(255,255,255,.15)}

/* ===== AI输入框 ===== */
.ask-box{background:#fff;border:1px solid var(--line);border-radius:14px;padding:14px;box-shadow:0 4px 16px rgba(7,21,34,.05)}
.ask-box textarea{width:100%;height:48px;border:0;outline:0;resize:none;font-size:14px;padding:4px;background:transparent}
.ask-tools{display:flex;justify-content:space-between;align-items:center;margin-top:8px}
.tool-group{display:flex;gap:8px}
.tool{border:1px solid var(--line);background:#f8f9fa;color:#647184;border-radius:9px;height:34px;padding:0 12px;font-size:11px;cursor:pointer;transition:.15s;display:flex;align-items:center;gap:5px}
.tool:hover{background:#eef0f3;border-color:#d5dbe1}

/* ===== 今日要事 ===== */
.today-item{border:1px solid var(--line);border-radius:13px;padding:16px;margin-top:12px;transition:.15s;cursor:pointer;background:#fff}
.today-item:hover{border-color:#d8c9a0;box-shadow:0 4px 14px rgba(194,154,85,.08)}
.today-item.expanded{border-color:var(--gold2)}
.today-item-top{display:flex;align-items:center;justify-content:space-between;gap:12px}
.today-item b{font-size:14px}
.today-item .desc{font-size:12px;color:var(--sub);margin-top:6px;line-height:1.5}
.today-detail{font-size:12px;color:var(--sub);line-height:1.7;margin-top:12px;padding-top:12px;border-top:1px solid var(--line)}

/* ===== 分身汇报入口卡 ===== */
.twin-entry{background:linear-gradient(135deg,#1a3a56,#0d2438);border-radius:var(--radius);color:#fff;padding:22px;display:grid;grid-template-columns:1fr auto;gap:20px;align-items:center;border:1px solid rgba(226,195,127,.2)}
.twin-entry h3{font-size:16px;margin:0}
.twin-entry p{font-size:12px;color:#aebfce;line-height:1.6;margin:7px 0 0}
.twin-entry-stats{display:flex;gap:18px;margin-top:12px}
.twin-entry-stats span{font-size:12px;color:#aebfce}
.twin-entry-stats b{color:var(--gold2)}

/* ===== 快捷入口小标签 ===== */
.quick-tags{display:flex;gap:10px;margin-top:var(--gap);flex-wrap:wrap}
.quick-tag{border:1px solid var(--line);background:#fff;border-radius:10px;padding:10px 16px;font-size:12px;font-weight:600;color:var(--ink);cursor:pointer;transition:.15s;display:flex;align-items:center;gap:7px}
.quick-tag:hover{border-color:var(--gold2);background:#fffdf7}
.quick-tag .qico{width:28px;height:28px;border-radius:8px;background:var(--bluebg);color:var(--blue);display:grid;place-items:center;font-size:10px;font-weight:800}

/* ===== 洪总分身 - 对话区 ===== */
.chat-area{background:#f8f9fa;border:1px solid var(--line);border-radius:13px;padding:16px;margin-top:14px}
.chat-msg{display:flex;gap:11px;margin-bottom:14px}
.chat-msg-avatar{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,var(--gold2),var(--gold3));display:grid;place-items:center;font-weight:800;font-size:12px;color:#25190a;flex:none}
.chat-msg.user .chat-msg-avatar{background:linear-gradient(135deg,var(--navy3),var(--navy2));color:#fff}
.chat-bubble{background:#fff;border:1px solid var(--line);border-radius:4px 13px 13px 13px;padding:12px 14px;font-size:13px;line-height:1.7;flex:1}
.chat-msg.user .chat-bubble{background:#fff8e9;border-color:#e8d09e;border-radius:13px 4px 13px 13px}
.chat-quick{display:flex;gap:9px;flex-wrap:wrap;margin-top:6px}
.chat-quick button{height:34px;border:1px solid var(--line);background:#fff;border-radius:9px;padding:0 14px;font-size:11.5px;cursor:pointer;transition:.15s}
.chat-quick button:hover{border-color:var(--gold2);background:#fff9ec;color:var(--amber)}

/* ===== 缰绳卡片 ===== */
.rein-level{border:1px solid var(--line);border-radius:13px;margin-top:12px;overflow:hidden;background:#fff}
.rein-level-head{padding:16px 18px;cursor:pointer;display:flex;align-items:center;justify-content:space-between;transition:.15s}
.rein-level-head:hover{background:#fafbfc}
.rein-level-head.open{border-bottom:1px solid var(--line)}
.rein-level-head b{font-size:14px}
.rein-level-head .count{font-size:11px;color:var(--sub);margin-left:8px}
.rein-item{border-top:1px solid #f0f1f3;padding:14px 18px;transition:.15s}
.rein-item:first-child{border:0}
.rein-item:hover{background:#fafdf9}
.rein-item b{font-size:13px}
.rein-item p{font-size:12px;color:var(--sub);line-height:1.6;margin:5px 0 8px}
.rein-item-meta{display:flex;gap:14px;font-size:10.5px;color:var(--muted)}
.rein-item-meta .conf{font-weight:700;color:var(--green)}

/* ===== 八板块网格 ===== */
.sector-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-top:14px}
.sector-card{border:1px solid var(--line);border-radius:13px;padding:16px;cursor:pointer;transition:.15s;background:#fff}
.sector-card:hover{border-color:#cdd3da;box-shadow:0 4px 14px rgba(7,21,34,.06)}
.sector-card.expanded{border-color:var(--gold2)}
.sector-light{width:11px;height:11px;border-radius:50%;display:inline-block;margin-right:7px;vertical-align:middle}
.light-green{background:var(--green);box-shadow:0 0 0 3px var(--greenbg)}
.light-amber{background:var(--amber);box-shadow:0 0 0 3px var(--amberbg)}
.light-gray{background:#c4ccd5;box-shadow:0 0 0 3px #eef0f3}
.sector-card b{font-size:13px}
.sector-card .s-status{font-size:11px;color:var(--sub);margin-top:6px}
.sector-card .s-acc{font-size:10.5px;color:var(--muted);margin-top:4px}
.sector-detail{font-size:12px;color:var(--sub);line-height:1.65;margin-top:12px;padding-top:12px;border-top:1px solid var(--line)}

/* ===== 授权矩阵 ===== */
.auth-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-top:14px}
.auth-col{border-radius:13px;padding:18px;border:1px solid var(--line);background:#fff}
.auth-col.green{border-color:#c3e6d4}
.auth-col.amber{border-color:#ecd9a8}
.auth-col.red{border-color:#e8b8bc}
.auth-col-head{display:flex;align-items:center;gap:9px;margin-bottom:10px}
.auth-dot{width:12px;height:12px;border-radius:50%}
.auth-col.green .auth-dot{background:var(--green)}
.auth-col.amber .auth-dot{background:var(--amber)}
.auth-col.red .auth-dot{background:var(--red)}
.auth-col-head b{font-size:13px}
.auth-col p{font-size:12px;color:var(--sub);line-height:1.7;margin:0}
.auth-stat{margin-top:12px;padding-top:12px;border-top:1px solid var(--line);font-size:12px;font-weight:700}

/* ===== 盲测验证 ===== */
.blind-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-top:14px}
.blind-item{border:1px solid var(--line);border-radius:13px;padding:16px;text-align:center;background:#fff}
.blind-item b{font-size:22px;color:var(--navy);display:block}
.blind-item span{font-size:11px;color:var(--sub);margin-top:5px;display:block}
.blind-item.gold b{color:var(--gold3)}

/* ===== 想法转化 - 步骤指引 ===== */
.steps{display:flex;align-items:center;gap:0;margin-bottom:20px}
.step{flex:1;text-align:center;padding:14px;border:1px solid var(--line);border-radius:13px;background:#fff;transition:.2s;position:relative}
.step.active{border-color:var(--gold2);background:#fffdf7;box-shadow:0 4px 14px rgba(194,154,85,.1)}
.step-dot{width:32px;height:32px;border-radius:50%;background:#eef0f3;color:var(--muted);display:grid;place-items:center;margin:0 auto 8px;font-weight:800;font-size:13px;transition:.2s}
.step.active .step-dot{background:linear-gradient(135deg,var(--gold3),var(--gold2));color:#25190a}
.step b{font-size:12.5px;display:block}
.step span{font-size:10.5px;color:var(--sub);margin-top:3px;display:block}
.step-arrow{width:32px;display:grid;place-items:center;color:var(--muted);font-size:18px;flex:none}

/* ===== 录音区 ===== */
.record-card{margin-top:var(--gap)}
.record-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.record-head b{font-size:14px}
.clock{font-size:20px;font-variant-numeric:tabular-nums;color:var(--ink);font-weight:700}
.wave{height:64px;background:#f3f5f7;border-radius:11px;display:flex;align-items:center;justify-content:center;gap:4px;margin:12px 0}
.wave i{width:4px;height:18px;background:#c4ccd5;border-radius:4px;font-style:normal}
.wave.live i{background:var(--gold);animation:wave .8s ease-in-out infinite alternate}
.wave.live i:nth-child(2n){animation-delay:.2s}
.wave.live i:nth-child(3n){animation-delay:.4s}
@keyframes wave{to{height:48px}}
.record-actions{display:flex;gap:10px}

/* ===== 事项卡 ===== */
.matter-card{border:1px solid #eadbbb;background:#fff;border-radius:11px;padding:14px;margin-top:12px;cursor:pointer;transition:.15s}
.matter-card:hover{box-shadow:0 4px 14px rgba(194,154,85,.08)}
.matter-card.expanded{border-color:var(--gold2)}
.matter-top{display:flex;justify-content:space-between;gap:10px;align-items:flex-start}
.matter-card b{font-size:13px}
.matter-card p{font-size:12px;color:var(--sub);line-height:1.55;margin:6px 0 0}
.matter-detail{font-size:12px;color:var(--sub);line-height:1.7;margin-top:12px;padding-top:12px;border-top:1px solid var(--line)}
.matter-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:12px}

/* ===== 看板 ===== */
.kanban{display:grid;grid-template-columns:repeat(3,1fr);gap:var(--gap);margin-top:var(--gap)}
.kanban-col{background:#fff;border:1px solid var(--line);border-radius:var(--radius);padding:16px;min-height:200px}
.kanban-col-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;padding-bottom:12px;border-bottom:1px solid var(--line)}
.kanban-col-head b{font-size:13px}
.task-card{border:1px solid var(--line);border-radius:11px;padding:14px;margin-bottom:12px;cursor:pointer;transition:.15s}
.task-card:hover{border-color:#d8c9a0;box-shadow:0 3px 12px rgba(194,154,85,.07)}
.task-card.expanded{border-color:var(--gold2)}
.task-card b{font-size:13px;display:block}
.task-card .t-src{font-size:10.5px;color:var(--muted);margin-top:5px}
.task-card .t-actions{display:flex;justify-content:space-between;align-items:center;margin-top:10px}
.task-detail{font-size:12px;color:var(--sub);line-height:1.65;margin-top:12px;padding-top:12px;border-top:1px solid var(--line)}

/* ===== Agent协作室 ===== */
.chatroom{display:grid;grid-template-columns:220px 1fr 300px;gap:var(--gap);height:calc(100vh - 140px);min-height:560px;overflow:hidden}
.cr-col{background:#fff;border:1px solid var(--line);border-radius:var(--radius);display:flex;flex-direction:column;overflow:hidden}
.cr-head{height:52px;border-bottom:1px solid var(--line);padding:0 16px;display:flex;align-items:center;justify-content:space-between;flex:none}
.cr-head b{font-size:13px}
.cr-head span{font-size:10px;color:var(--sub)}
.cr-body{flex:1;overflow:auto;padding:16px}
.agent-item{border:1px solid var(--line);border-radius:10px;padding:12px;margin-bottom:10px;transition:.15s}
.agent-item.chief{border-color:#e5d2a8;background:#fffdf7}
.agent-item b{font-size:12px}
.agent-item p{font-size:10.5px;color:var(--sub);line-height:1.5;margin:4px 0 0}
.msg{max-width:88%;margin-bottom:16px}
.msg.user{margin-left:auto}
.who{font-size:10px;color:var(--sub);margin:0 4px 6px}
.bubble{border:1px solid var(--line);border-radius:5px 13px 13px 13px;padding:12px 14px;font-size:13px;line-height:1.7;background:#fff}
.msg.user .bubble{background:#fff8e9;border-color:#e8d09e;border-radius:13px 5px 13px 13px}
.bubble .mention{color:var(--blue);font-weight:700}
.artifact{border:1px solid #ddd3bf;background:#fffdf7;border-radius:10px;padding:11px;margin-top:9px;display:grid;grid-template-columns:36px 1fr;gap:10px;align-items:center}
.doc-ico{width:36px;height:36px;border-radius:9px;background:var(--bluebg);color:var(--blue);display:grid;place-items:center;font-size:9px;font-weight:800}
.artifact b{font-size:11px}
.artifact small{font-size:10px;color:var(--sub);display:block;margin-top:3px}
.composer{padding:12px;border-top:1px solid var(--line);flex:none}
.compose{border:1px solid var(--line);border-radius:11px;padding:10px}
.compose textarea{width:100%;height:36px;border:0;outline:0;resize:none;font-size:12.5px}
.compose-actions{display:flex;justify-content:space-between;margin-top:6px}
.review-panel{padding:16px}
.review-item{border:1px solid var(--line);border-radius:10px;padding:12px;margin-bottom:10px}
.review-item b{font-size:12px}
.review-item p{font-size:11px;color:var(--sub);line-height:1.55;margin:5px 0 0}

/* ===== 项目协作 ===== */
.proj-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-top:14px}
.proj-card{border:1px solid var(--line);border-radius:13px;padding:16px;background:#fff;transition:.15s}
.proj-card:hover{box-shadow:0 4px 14px rgba(7,21,34,.05)}
.proj-card b{font-size:13px}
.proj-card p{font-size:11.5px;color:var(--sub);line-height:1.6;margin:6px 0 10px}

.relay-item{display:grid;grid-template-columns:32px 1fr auto;gap:11px;align-items:center;padding:13px 0;border-top:1px solid #f0f1f3}
.relay-item:first-of-type{border:0}
.relay-num{width:32px;height:32px;border-radius:9px;background:var(--navy);color:#fff;display:grid;place-items:center;font-size:12px;font-weight:800}
.relay-item b{font-size:12.5px}
.relay-item p{font-size:11px;color:var(--sub);margin:3px 0 0}

/* ===== 管理驾驶舱 ===== */
.dash-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
.dash-metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px}
.dash-metric{border:1px solid var(--line);border-radius:13px;padding:18px;background:#fff}
.dash-metric b{font-size:24px;color:var(--navy);display:block}
.dash-metric span{font-size:11px;color:var(--sub);margin-top:5px;display:block}
.dash-metric .delta{font-size:11px;font-weight:700;color:var(--green);margin-top:4px}
.alert-item{display:flex;gap:12px;padding:13px 0;border-top:1px solid #f0f1f3}
.alert-item:first-of-type{border:0}
.alert-item .a-dot{width:8px;height:8px;border-radius:50%;margin-top:6px;flex:none}
.alert-item b{font-size:12.5px}
.alert-item p{font-size:11.5px;color:var(--sub);line-height:1.55;margin:4px 0 0}

/* ===== Toast ===== */
.toast{position:fixed;top:24px;left:50%;transform:translateX(-50%) translateY(-100px);background:var(--navy);color:#fff;padding:12px 22px;border-radius:11px;font-size:13px;z-index:200;opacity:0;transition:.3s;box-shadow:0 10px 30px rgba(0,0,0,.2)}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}

/* ===== 滚动条 ===== */
::-webkit-scrollbar{width:7px;height:7px}
::-webkit-scrollbar-thumb{background:#cdd3da;border-radius:4px}
::-webkit-scrollbar-track{background:transparent}

/* ============================================================
   核心渲染函数
   ============================================================ */
function renderView(view){
  // 离开录音页停止计时
  if(state.recording && view!=='capture') stopRecord();
  state.view = view;
  // 更新侧边栏激活态
  nav.querySelectorAll('button').forEach(function(b){
    b.classList.toggle('active', b.dataset.view===view);
  });
  // 更新面包屑
  crumbTitle.textContent = viewTitles[view] || '';
  // 渲染内容
  content.innerHTML = views[view] ? views[view]() : '<div class="view"><p>页面未实现</p></div>';
  content.scrollTop = 0;
  // 滚动到底部（对话页）
  if(view==='chatroom'){
    var body = document.getElementById('chatroomBody');
    if(body) body.scrollTop = body.scrollHeight;
  }
  if(view==='hongtwin'){
    var chat = document.getElementById('hongtwinChat');
    if(chat) chat.scrollTop = chat.scrollHeight;
  }
}

/* ============================================================
   Toast 提示
   ============================================================ */
var toastTimer = null;
function showToast(msg){
  toastEl.textContent = msg;
  toastEl.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(function(){ toastEl.classList.remove('show'); }, 2400);
}

/* ============================================================
   录音模拟
   ============================================================ */
function startRecord(){
  state.recording = true;
  state.seconds = 0;
  updateClock();
  state.timer = setInterval(function(){
    state.seconds++;
    updateClock();
  },1000);
  var wave = document.getElementById('recWave');
  if(wave) wave.classList.add('live');
  var btn = document.getElementById('recBtn');
  if(btn){ btn.textContent='停止录音'; btn.classList.remove('primary'); btn.classList.add('gold'); }
  showToast('开始录音...');
}
function stopRecord(){
  if(!state.recording) return;
  state.recording = false;
  clearInterval(state.timer);
  var wave = document.getElementById('recWave');
  if(wave) wave.classList.remove('live');
  var btn = document.getElementById('recBtn');
  if(btn){ btn.textContent='开始录音'; btn.classList.add('primary'); btn.classList.remove('gold'); }
  if(state.view==='capture'){
    state.captureStep = 2;
    state.mattersVisible = true;
    renderView('capture');
    showToast('录音结束（'+fmtTime(state.seconds)+'），AI已识别3条事项');
  }
}
function updateClock(){
  var el = document.getElementById('recClock');
  if(el) el.textContent = fmtTime(state.seconds);
}
function fmtTime(s){
  var m = Math.floor(s/60), sec = s%60;
  return (m<10?'0':'')+m+':'+(sec<10?'0':'')+sec;
}

/* ============================================================
   洪总分身 - 追问对话
   ============================================================ */
function hongtwinAsk(key){
  if(state.hongtwinAsked[key]) { showToast('该追问已回复'); return; }
  state.hongtwinAsked[key] = true;
  var reply = hongtwinReplies[key];
  // 模拟用户追问
  var qMap = {risk:'展开风险详情',progress:'各板块进度',opportunity:'有什么新机会'};
  state.hongtwinMsgs.push({ who:'user', text:qMap[key] });
  state.hongtwinMsgs.push({ who:'twin', text:reply });
  // 局部刷新对话区
  var chat = document.getElementById('hongtwinChat');
  if(chat){ chat.innerHTML = renderHongtwinMsgs(); chat.scrollTop = chat.scrollHeight; }
  // 更新追问按钮状态
  var btns = document.querySelectorAll('#hongtwinQuick button');
  btns.forEach(function(b){ if(b.dataset.ask===key){ b.style.opacity='.5'; b.style.cursor='default'; } });
}

/* ============================================================
   Agent协作室 - 发送消息
   ============================================================ */
function sendChat(){
  var input = document.getElementById('chatInput');
  if(!input) return;
  var text = input.value.trim();
  if(!text){ showToast('请输入消息'); return; }
  var now = new Date();
  var time = (now.getHours()<10?'0':'')+now.getHours()+':'+(now.getMinutes()<10?'0':'')+now.getMinutes();
  state.chatroomMsgs.push({ who:'human', name:roles[state.role].name, text:text, time:time });
  // 模拟Agent回复
  input.value='';
  var body = document.getElementById('chatroomBody');
  if(body){ body.innerHTML = state.chatroomMsgs.map(function(m){
    var cls = m.who==='human'?'user':'';
    var fileHtml = m.file?'<div class="artifact"><div class="doc-ico">'+m.file.type+'</div><div><b>'+m.file.name+'</b><small>'+m.file.meta+'</small></div></div>':'';
    return '<div class="msg '+cls+'"><div class="who">'+m.name+' · '+m.time+'</div><div class="bubble">'+m.text.replace(/\n/g,'<br>')+fileHtml+'</div></div>';
  }).join(''); body.scrollTop = body.scrollHeight; }
  // 延迟Agent回复
  setTimeout(function(){
    var reply = '收到。我已经根据缰绳体系分析你的需求，正在编排处理。需要调用相关Agent协同完成，预计3分钟内给出结果。';
    state.chatroomMsgs.push({ who:'agent', name:'参谋长', text:reply, time:time });
    var body2 = document.getElementById('chatroomBody');
    if(body2){ body2.innerHTML = state.chatroomMsgs.map(function(m){
      var cls = m.who==='human'?'user':'';
      var fileHtml = m.file?'<div class="artifact"><div class="doc-ico">'+m.file.type+'</div><div><b>'+m.file.name+'</b><small>'+m.file.meta+'</small></div></div>':'';
      return '<div class="msg '+cls+'"><div class="who">'+m.name+' · '+m.time+'</div><div class="bubble">'+m.text.replace(/\n/g,'<br>')+fileHtml+'</div></div>';
    }).join(''); body2.scrollTop = body2.scrollHeight; }
  },800);
}

/* ============================================================
   事件委托（处理所有动态内容交互）
   ============================================================ */
// 侧边栏导航
nav.addEventListener('click', function(e){
  var btn = e.target.closest('button[data-view]');
  if(!btn) return;
  renderView(btn.dataset.view);
});

// 角色切换
roleCard.addEventListener('click', function(e){
  e.stopPropagation();
  roleMenu.classList.toggle('show');
});
roleMenu.addEventListener('click', function(e){
  var opt = e.target.closest('.role-option');
  if(!opt) return;
  var key = opt.dataset.role;
  var r = roles[key];
  if(!r) return;
  state.role = key;
  roleName.textContent = r.name;
  roleScope.textContent = r.scope;
  roleAvatar.textContent = r.avatar;
  cockpitNav.style.display = key==='hong' ? '' : 'none';
  roleMenu.classList.remove('show');
  showToast('已切换到 '+r.name);
  // 洪总角色默认进入分身页
  if(key==='hong') renderView('hongtwin');
});
document.addEventListener('click', function(e){
  if(!roleMenu.contains(e.target) && !roleCard.contains(e.target)) roleMenu.classList.remove('show');
});

// 内容区事件委托
content.addEventListener('click', function(e){
  // 折叠/展开（通用）
  var toggle = e.target.closest('[data-toggle]');
  if(toggle && !e.target.closest('.collapse-body')){
    var body = document.getElementById(toggle.dataset.toggle);
    if(body){
      var isOpen = body.classList.toggle('open');
      toggle.classList.toggle('open', isOpen);
      if(toggle.classList.contains('today-item')||toggle.classList.contains('matter-card')||toggle.classList.contains('task-card')||toggle.classList.contains('sector-card')){
        toggle.classList.toggle('expanded', isOpen);
      }
      // 文件审阅面板特殊处理
      if(toggle.dataset.toggle==='reviewBody'){
        var wrap = document.getElementById('reviewBodyWrap');
        if(wrap){
          var hidden = wrap.style.display === 'none';
          wrap.style.display = hidden ? '' : 'none';
          toggle.textContent = hidden ? '收起 ▴' : '查看审阅 ▾';
        }
      }
    }
  }

  // 追问按钮（洪总分身）
  var askBtn = e.target.closest('[data-ask]');
  if(askBtn){ hongtwinAsk(askBtn.dataset.ask); return; }

  // 确认去向按钮
  var confirmBtn = e.target.closest('[data-confirm]');
  if(confirmBtn){ showToast('已确认去向，已自动流转'); return; }

  // 通用动作按钮
  var actBtn = e.target.closest('[data-act]');
  if(actBtn){
    var act = actBtn.dataset.act;
    var msg = actBtn.dataset.msg;
    switch(act){
      case 'goHongtwin': renderView('hongtwin'); break;
      case 'goCapture': renderView('capture'); break;
      case 'goWork': renderView('work'); break;
      case 'goProject': renderView('project'); break;
      case 'record':
        if(state.view==='capture' || state.view==='home'){
          if(state.recording) stopRecord();
          else {
            if(state.view==='home'){ renderView('capture'); }
            setTimeout(startRecord, 100);
          }
        } else { renderView('capture'); }
        break;
      case 'import': case 'importFile': showToast('请选择要导入的资料文件'); break;
      case 'voice': showToast('语音输入已启动，请开始说话'); break;
      case 'sendAsk':
        var ask = document.getElementById('homeAsk');
        if(ask && ask.value.trim()){ showToast('已发送给分身：'+ask.value.trim().slice(0,20)+'...'); ask.value=''; }
        else showToast('请输入内容');
        break;
      case 'aiRecognize':
        state.captureStep = 3;
        state.mattersVisible = true;
        renderView('capture');
        showToast('AI已识别3条事项，请确认去向');
        break;
      case 'sendChat': sendChat(); break;
      case 'toast': showToast(msg||'操作完成'); break;
    }
  }
});

// Enter键发送（协作室 & 首页输入框）
content.addEventListener('keydown', function(e){
  if(e.key==='Enter' && !e.shiftKey){
    var ta = e.target;
    if(ta.id==='chatInput'){ e.preventDefault(); sendChat(); }
    if(ta.id==='homeAsk'){ e.preventDefault(); var btn=document.querySelector('[data-act="sendAsk"]'); if(btn) btn.click(); }
    if(ta.id==='captureText'){ e.preventDefault(); var b=document.querySelector('[data-act="aiRecognize"]'); if(b) b.click(); }
  }
});

/* ============================================================
   初始化
   ============================================================ */
renderView('home');
</script>
